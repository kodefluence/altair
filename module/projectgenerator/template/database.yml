# This database file represent any instance of database that can be connected and used in any plugin of Altair
# This config is environment agnostic, so it can be used in any environment based on it's environment variables.
# version: string                             - Template version of database.yml.
# instances: <hash>                           - Map of named database instances. Each plugin can reference an instance by name.
#   <database_name>: string                         - The database instance name
#     <example>
#     driver: string                                  - Database driver used, required. Available: mysql
#     database: string                                - Database name, required.
#     username: string                                - Username of the databases, required.
#     password: string                                - Database password, can be left empty.
#     host: string                                    - Database host location, required.
#     port: string || integer                         - Database port, if left empty then will use the default value: 3306.
#     connection_max_lifetime: string                 - Set max connection lifetime duration.
#     max_idle_connection: string | integer           - Set max idle connection of the database, if left empty then will be set unlimited.
#     max_open_connection: string | integer           - Set max open connection of the database, if left empty then will be set unlimited.

version: "1.0"
instances:
  main_database:
    driver: mysql
    database: {{ env "DATABASE_NAME" }}
    username: {{ env "DATABASE_USERNAME" }}
    password: {{ env "DATABASE_PASSWORD" }}
    host:     {{ env "DATABASE_HOST" }}
    port:     {{ env "DATABASE_PORT" }}
    connection_max_lifetime: 120s
    max_idle_connection: 100
    max_open_connection: 100
